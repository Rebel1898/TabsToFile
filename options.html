<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="options.css">
    <title>BookmarksToFile Settings</title>
</head>

<body>
    <h1>Settings</h1>

    <h3><u>Output file:</u></h3>

    <form id="optionsForm">
        <label>
            <input type="radio" name="opcion" value=".URL">
            .URL (Windows)
        </label><br>
        <label>
            <input type="radio" name="opcion" value=".desktop">
            .desktop (Linux)
        </label><br>
        <label>
            <input type="radio" name="opcion" value=".webloc">
            .webloc (Mac)
        </label><br>
        <label>
            <input type="radio" name="opcion" value=".txt">
            .txt
        </label><br>
        <label>
            <input type="radio" name="opcion" value=".HTML">
            .HTML file
        </label><br>
        <!-- <label>
            <input type="radio" name="opcion" value=".HTML2">
            .HTML complete (May take a while to complete)
        </label> -->
        <br>


        <br>
        <label><u>Extract tabs from all opened windows:</u></label><br><br>

        <label class="switch">
            <input type="checkbox" id="miCheckbox">
            <span class="slider"></span>
        </label>


        <br><br>

        <div id="statusMessage" style="color: #d08300; font-size: 0.9rem; display: none;">
           ⚠️ Unsaved changes
        </div>
        
        <div id="confirmMessage" style="color: #00d050; font-size: 0.9rem; display: none;">
           Saved changes!
        </div>
        <button id="confirmButton" type="submit" disabled>Confirm changes</button>
    </form>

    <script src="options.js"></script>
</body>

</html>
